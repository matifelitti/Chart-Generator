<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="div-chart-container">
        <canvas id="canvas-myChart"></canvas>
    </div>

    <div class="controls">
        <select class="select" id="select-chart-type">
            <option value="bar">Bar Chart</option>
            <option value="line">Line Chart</option>
            <option value="pie">Pie Chart</option>
            <option value="radar">Radar</option>
        </select>

        <input class="input" type="text" id="label" placeholder="Name (example: Sales January)">
        <input class="input" type="number" id="data" placeholder="Value (example: 50)">

        <button class="btn btn-add" onclick="addData()">Add Data</button>
        <button class="btn btn-update" onclick="updateChartType()">Update Chart Type</button>
        <button class="btn btn-update" onclick="removeLastData()">Remove Last</button>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
